spring:
  application:
    name: ecom-application

  datasource:
    url: jdbc:postgresql://localhost:5432/ecomdb
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: beans, health, info, shutdown

  endpoint:
    health:
      show-details: always
    shutdown:
      enabled: true

  info:
    env:
      enabled: true

info:
  app:
    name: E-commerce Application
    version: 1.0.0
    description: A simple e-commerce application built with Spring Boot

server:
  shutdown: graceful