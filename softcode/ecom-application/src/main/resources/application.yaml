management:
  endpoints:
    web:
      exposure:
        include: beans, health, info, shutdown

  endpoint:
    health:
      show-details: always
    shutdown:
      enabled: true

  info:
    env:
      enabled: true

info:
  app:
    name: E-commerce Application
    version: 1.0.0
    description: A simple e-commerce application built with Spring Boot

server:
  shutdown: graceful